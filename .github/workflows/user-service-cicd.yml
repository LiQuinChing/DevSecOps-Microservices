name: User Service CI/CD Pipeline

# Trigger only when files in the user-service folder change
on:
  push:
    branches:
      - dev-main-all # <-- Explicitly tell it to watch your new branch!
      - dev-main1    # <-- Keep the old one just in case
    paths:
      - 'server/user-service/**'
      - 'k8s/user-service.yaml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Secure Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/user-service:${{ github.run_id }} ./server/user-service
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest ./server/user-service
        
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/user-service:${{ github.run_id }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/user-service:latest

    - name: Set up Kubernetes Context
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Update Deployment Image
      run: |
        # Ensure the base deployment exists
        kubectl apply -f k8s/user-service.yaml
        
        # Update the deployment with the new versioned image
        kubectl set image deployment/user-service user-service=${{ secrets.ACR_LOGIN_SERVER }}/user-service:${{ github.run_id }}