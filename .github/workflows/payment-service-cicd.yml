name: Payment Service CI/CD Pipeline

# Trigger only when files in the payment-service folder change
on:
  push:
    paths:
      - 'server/payment-service/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Secure Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/payment-service:${{ github.run_id }} ./server/payment-service
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/payment-service:latest ./server/payment-service
        
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/payment-service:${{ github.run_id }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/payment-service:latest

    - name: Set up Kubernetes Context
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Update Deployment Image
      run: |
        # Apply the base configuration to ensure the deployment and service exist
        kubectl apply -f k8s/payment-service.yaml
        
        # Update the deployment to point to the newly built image in ACR
        kubectl set image deployment/payment-service payment-service=${{ secrets.ACR_LOGIN_SERVER }}/payment-service:${{ github.run_id }}