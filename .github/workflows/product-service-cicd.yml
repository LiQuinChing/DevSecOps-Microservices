name: Product Service CI/CD Pipeline

on:
  push:
    branches:
      - dev-main-all
    paths:
      - 'server/product-service/**'
      - 'k8s/apps/product-app.yaml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Secure Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/product-service:${{ github.run_id }} ./server/product-service
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest ./server/product-service
        
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/product-service:${{ github.run_id }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/product-service:latest

    - name: Set up Kubernetes Context
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Update Deployment Image
      run: |
        # Apply the infrastructure
        kubectl apply -f k8s/apps/product-app.yaml
        
        # Rollout the new container
        kubectl set image deployment/product-service product-service=${{ secrets.ACR_LOGIN_SERVER }}/product-service:${{ github.run_id }}