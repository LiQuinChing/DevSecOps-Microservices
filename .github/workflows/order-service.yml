name: Order Service CI/CD Pipeline

on:
  push:
    paths:
      - 'server/order-service/**'
      - 'k8s/apps/order-app.yaml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Secure Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/order-service:${{ github.run_id }} ./server/order-service
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest ./server/order-service
        
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/order-service:${{ github.run_id }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/order-service:latest

    - name: Set up Kubernetes Context
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Update Deployment Image
      run: |
        # Apply the base configuration to clear those ErrImageNeverPull errors!
        kubectl apply -f k8s/apps/order-app.yaml
        
        # Update the deployment to point to the newly built image in ACR
        kubectl set image deployment/order-service order-service=${{ secrets.ACR_LOGIN_SERVER }}/order-service:${{ github.run_id }}