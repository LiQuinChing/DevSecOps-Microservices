services:
  user-service:
    build:
      context: ./user-service
    container_name: user-service
    environment:
      SERVER_PORT: 8081
    ports:
      - "8081:8081"

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    environment:
      SERVER_PORT: 8083
      USER_SERVICE_URL: http://user-service:8081
    depends_on:
      - user-service
    ports:
      - "8083:8083"

order-service:
    build:
      context: ./server/order-service
    container_name: order-service
    environment:
      SERVER_PORT: 8082
      # Assuming order service needs to talk to user or payment service:
      # USER_SERVICE_URL: http://user-service:8081
    ports:
      - "8082:8082"

client:
    build:
      context: ./client
    container_name: mini-ecommerce-client
    depends_on:
      - user-service
      - payment-service
      - order-service
    ports:
      - "8080:8080"
