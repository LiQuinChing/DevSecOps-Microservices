# ========================================
# SERVER CONFIGURATION
# ========================================
# Server port for user-service microservice
server.port=${SERVER_PORT:8081}

# Application name
spring.application.name=user-service

# ========================================
# H2 DATABASE CONFIGURATION
# ========================================
# H2 in-memory database URL (data persists during runtime, clears on restart)
spring.datasource.url=jdbc:h2:mem:userdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========================================
# JPA/HIBERNATE CONFIGURATION
# ========================================
# Auto-create/update database schema based on entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 dialect for Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ========================================
# H2 CONSOLE CONFIGURATION
# ========================================
# Enable H2 web console for database inspection
spring.h2.console.enabled=true

# H2 console path: http://localhost:8081/h2-console
spring.h2.console.path=/h2-console

# Allow H2 console access from any IP (use with caution in production)
spring.h2.console.settings.web-allow-others=false

# ========================================
# JWT CONFIGURATION
# ========================================
# Secret key for JWT signing (change this in production!)
jwt.secret=MySecretKeyForUserServiceMicroserviceEcommerceSystem2026Assignment

# JWT token prefix used in Authorization header
jwt.prefix=Bearer

# JWT token expiration time in milliseconds (86400000 = 24 hours)
jwt.expiration=86400000

# ========================================
# LOGGING CONFIGURATION
# ========================================
# Set logging level for application
logging.level.com.ecommerce.userservice=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# ========================================
# SWAGGER/OPENAPI CONFIGURATION
# ========================================
# Swagger UI path: http://localhost:8081/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# API docs path: http://localhost:8081/v3/api-docs
springdoc.api-docs.path=/v3/api-docs

# ========================================
# VALIDATION CONFIGURATION
# ========================================
# Enable validation for request bodies
# Note: throw-exception-if-no-handler-found is deprecated and removed in Spring Boot 3.x
spring.web.resources.add-mappings=false
