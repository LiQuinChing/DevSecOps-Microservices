# ========================================
# SERVER CONFIGURATION
# ========================================
server.port=${SERVER_PORT:8083}

spring.application.name=payment-service

# ========================================
# H2 DATABASE CONFIGURATION
# ========================================
spring.datasource.url=jdbc:h2:mem:paymentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ========================================
# JPA/HIBERNATE CONFIGURATION
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ========================================
# H2 CONSOLE CONFIGURATION
# ========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ========================================
# INTER-SERVICE COMMUNICATION
# ========================================
# URL of user-service (must be running on port 8081)
user.service.url=${USER_SERVICE_URL:http://localhost:8081}

# ========================================
# JWT CONFIGURATION
# ========================================
jwt.secret=MySecretKeyForUserServiceMicroserviceEcommerceSystem2026Assignment
jwt.expiration=86400000

# ========================================
# LOGGING CONFIGURATION
# ========================================
logging.level.com.ecommerce.paymentservice=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO

# ========================================
# SWAGGER/OPENAPI CONFIGURATION
# ========================================
# Swagger UI: http://localhost:8083/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# API docs: http://localhost:8083/v3/api-docs
springdoc.api-docs.path=/v3/api-docs

# ========================================
# VALIDATION CONFIGURATION
# ========================================
spring.web.resources.add-mappings=false
