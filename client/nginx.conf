server {
    listen 8080;
    server_name localhost;
    
    # 1. Serve the React Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy User API requests and strip the /api prefix
    # Notice the trailing slashes here!
    location /api/users/ {
        # This translates /api/users/register -> /users/register
        proxy_pass http://user-service:8081/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Proxy Payment API requests and strip the /api prefix
    location /api/payments/ {
        # Translates /api/payments/... to /payments/...
        proxy_pass http://payment-service:8083/payments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}