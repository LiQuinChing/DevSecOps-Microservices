server {
    listen 8080;
    server_name localhost;
    
    # 1. Serve the React Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2a. Proxy User API (Wildcard for paths like /api/users/1)
    location /api/users/ {
        proxy_pass http://user-service:8081/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 2b. Proxy User API (Exact match for /api/users)
    location = /api/users {
        proxy_pass http://user-service:8081/users;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3a. Proxy Payment API (Wildcard for paths like /api/payments/user/1)
    location /api/payments/ {
        proxy_pass http://payment-service:8083/payments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 3b. Proxy Payment API (Exact match for /api/payments)
    location = /api/payments {
        proxy_pass http://payment-service:8083/payments;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 4a. Proxy Order API (Wildcard)
    location /api/orders/ {
        # Changed port from 8080 to 80 to match your Kubernetes Service
        proxy_pass http://order-service:8080/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 4b. Proxy Order API (Exact match)
    location = /api/orders {
        # Changed port from 8080 to 80 to match your Kubernetes Service
        proxy_pass http://order-service:8080/orders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # 5a. Proxy Product API (Wildcard)
    location /api/products/ {
        proxy_pass http://product-service:5000/api/products/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 5b. Proxy Product API (Exact match)
    location = /api/products {
        proxy_pass http://product-service:5000/api/products;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 6a. Proxy Supplier API (Wildcard)
    location /api/suppliers/ {
        proxy_pass http://product-service:5000/api/suppliers/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # 6b. Proxy Supplier API (Exact match)
    location = /api/suppliers {
        proxy_pass http://product-service:5000/api/suppliers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}